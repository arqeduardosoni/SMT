name: Android AAB (Google Play)

on:
  workflow_dispatch: {}   # permite lanzarlo a mano desde la pestaña Actions
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'android/**'
      - 'package.json'
      - 'capacitor.config.*'
      - '.github/workflows/android.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build web + Capacitor sync
        run: |
          npm ci || npm install
          npm run build
          npx cap sync android

      - name: Decode upload keystore
        run: echo "${{ secrets.SMT_KEYSTORE_B64 }}" | base64 -d > android/app/smt-upload.jks

      - name: Build signed AAB
        working-directory: android
        env:
          SMT_KEYSTORE_FILE: smt-upload.jks
          SMT_KEYSTORE_PASSWORD: ${{ secrets.SMT_KEYSTORE_PASSWORD }}
          SMT_KEY_ALIAS: ${{ secrets.SMT_KEY_ALIAS }}
          SMT_KEY_PASSWORD: ${{ secrets.SMT_KEY_PASSWORD }}
          SMT_VERSION_CODE: ${{ github.run_number }}
        run: |
          chmod +x ./gradlew
          ./gradlew bundleRelease --no-daemon

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: smt-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
